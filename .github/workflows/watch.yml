name: Watch AI updates

# 1日2回(09:00 / 21:00 JST)、公式ブログ・リリースノートの新着を検知して
# 下書き記事(draft: true)を自動コミットするワークフロー。
# 手動実行(workflow_dispatch)も可能。

on:
  schedule:
    - cron: '0 0 * * *'   # 09:00 JST
    - cron: '0 12 * * *'  # 21:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: watch-ai-updates
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run watcher
        run: node scripts/watch.mjs

      - name: Generate article bodies
        run: node scripts/generate.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit new drafts (if any)
        if: always()
        run: |
          git config user.name "ai-watch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/content/posts scripts/data/seen.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: detect new AI updates ($(date -u +%Y-%m-%d))"
            git push
          fi
